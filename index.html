<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Denis Zholob" />
    <meta
      name="keywords"
      content="Splendor, nobles, cities, randomizer, board game, shareable url, Denis Zholob"
    />
    <meta name="title" content="Splendor Randomizer" />
    <meta
      name="description"
      content="Generate random Splendor nobles or cities, then share the URL so everyone sees the same tiles."
    />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Splendor Randomizer" />
    <meta property="og:title" content="Splendor Randomizer" />
    <meta
      property="og:description"
      content="Generate random Splendor nobles or cities and share the same selection with a link."
    />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/webp" href="./assets/tokens/yellow.webp" />
    <link rel="apple-touch-icon" href="./assets/tokens/yellow.webp" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Splendor Randomizer</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="min-h-dvh bg-slate-950 text-white antialiased">
    <main
      id="app-shell"
      class="mx-auto flex min-h-dvh w-full max-w-[1200px] flex-col px-3 py-4 text-white sm:px-4 lg:px-6"
    >
      <header class="relative mb-4 text-center sm:mb-5">
        <h1>
          <a
            class="inline-block text-[0.72rem] font-bold uppercase tracking-[0.32em] text-amber-300 no-underline transition hover:text-amber-200 focus:outline-none focus-visible:text-amber-100"
            href="./"
          >
            Splendor Randomizer
          </a>
        </h1>
        <p id="mode-description" class="mx-auto mt-2 max-w-3xl text-sm text-slate-300 sm:text-base">
          Generate a random set of nobles, share the URL so everyone sees the same tiles, then mark
          claimed tiles by player as the game moves.
        </p>
        <button
          id="fullscreen-button"
          class="fixed right-3 top-3 z-50 inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/12 bg-slate-950/75 text-white shadow-[0_10px_28px_rgba(0,0,0,0.28)] transition hover:bg-slate-900/90 focus:outline-none focus-visible:border-amber-300 sm:right-4 sm:top-4"
          type="button"
          aria-label="Toggle fullscreen"
        >
          <svg
            aria-hidden="true"
            viewBox="0 0 24 24"
            class="h-5 w-5 fill-none stroke-current stroke-2"
          >
            <path d="M8 3H4v4"></path>
            <path d="M16 3h4v4"></path>
            <path d="M8 21H4v-4"></path>
            <path d="M16 21h4v-4"></path>
          </svg>
        </button>
      </header>

      <section
        class="mb-4 rounded-lg border border-white/12 bg-slate-950/45 p-2.5 shadow-[0_14px_38px_rgba(0,0,0,0.22)] backdrop-blur-sm sm:mb-5 sm:p-3"
      >
        <form id="controls-form" class="flex flex-col gap-2">
          <fieldset class="space-y-3">
            <legend class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-slate-300">
              Tile Type
            </legend>
            <div class="grid grid-cols-2 gap-2 rounded-lg bg-white/5 p-1">
              <label
                class="block cursor-pointer rounded-md px-3 py-2.5 text-center text-xs font-black uppercase tracking-[0.18em] text-slate-300 transition has-[:checked]:bg-amber-100/14 has-[:checked]:text-amber-100 hover:bg-white/8"
              >
                <input class="sr-only" type="radio" name="mode" value="nobles" checked />
                <span>Nobles</span>
              </label>
              <label
                class="block cursor-pointer rounded-md px-3 py-2.5 text-center text-xs font-black uppercase tracking-[0.18em] text-slate-300 transition has-[:checked]:bg-amber-100/14 has-[:checked]:text-amber-100 hover:bg-white/8"
              >
                <input class="sr-only" type="radio" name="mode" value="cities" />
                <span>Cities</span>
              </label>
            </div>
          </fieldset>

          <div class="grid gap-2 sm:grid-cols-[minmax(0,1fr)_minmax(0,180px)]">
            <label class="block">
              <span
                class="mb-2 flex items-center justify-between gap-3 text-xs font-bold uppercase tracking-[0.18em] text-slate-300"
              >
                <span>Players</span>
                <span class="text-[0.7rem] normal-case tracking-normal text-slate-400">
                  comma or space separated
                </span>
              </span>
              <input id="players-input" type="hidden" name="players" value="" />
              <div
                id="players-editor"
                class="player-editor min-h-[38px] w-full rounded-lg border border-white/10 bg-slate-900/90 px-3 py-1 text-sm text-white outline-none transition focus-within:border-amber-300"
              >
                <div id="players-editor-list" class="player-editor-list"></div>
                <input
                  id="players-editor-input"
                  class="player-editor-input"
                  type="text"
                  aria-label="Players"
                  placeholder="Bob Alice Jack Jill"
                  autocomplete="off"
                  spellcheck="false"
                />
                <button
                  id="players-clear-button"
                  class="player-editor-clear hidden"
                  type="button"
                  aria-label="Clear players"
                >
                  ×
                </button>
              </div>
            </label>

            <label class="block">
              <span
                class="mb-2 flex items-center justify-between gap-3 text-xs font-bold uppercase tracking-[0.18em] text-slate-300"
              >
                <span>Tile Count</span>
                <span
                  id="count-hint"
                  class="text-[0.7rem] normal-case tracking-normal text-slate-400"
                >
                  Override
                </span>
              </span>
              <div class="flex items-center gap-2">
                <input
                  id="count-input"
                  class="w-full rounded-lg border border-white/10 bg-slate-900/90 px-3 py-2 text-sm font-bold text-white outline-none transition placeholder:text-slate-500 focus:border-amber-300 disabled:cursor-not-allowed disabled:border-white/6 disabled:bg-slate-900/45 disabled:text-slate-500"
                  type="number"
                  name="count"
                  min="1"
                  max="3"
                  value="3"
                  inputmode="numeric"
                  disabled
                />
                <label
                  class="flex h-[38px] w-[38px] shrink-0 items-center justify-center rounded-lg border border-white/10 bg-slate-900/90 text-slate-400 transition hover:border-white/16 hover:bg-slate-900 disabled:cursor-not-allowed"
                  title="Override tile count"
                >
                  <input
                    id="count-override-input"
                    class="h-4 w-4 rounded border-white/20 bg-slate-900/90 text-amber-300"
                    type="checkbox"
                    aria-label="Override tile count"
                  />
                </label>
              </div>
            </label>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <button
              id="reroll-button"
              class="rounded-lg bg-amber-300 px-3 py-2 text-[0.7rem] font-black uppercase tracking-[0.18em] text-slate-950 transition hover:bg-amber-200"
              type="button"
            >
              Reroll
            </button>
            <button
              id="share-button"
              class="rounded-lg border border-white/10 bg-white/8 px-3 py-2 text-[0.7rem] font-black uppercase tracking-[0.18em] text-white transition hover:bg-white/12"
              type="button"
            >
              Share
            </button>
          </div>
        </form>
      </section>

      <section id="results-section" class="flex-1">
        <div id="results-grid" class="result-board" aria-live="polite"></div>
      </section>

      <details
        class="mt-8 rounded-lg border border-white/12 bg-slate-950/35 p-4 shadow-[0_18px_55px_rgba(0,0,0,0.18)] backdrop-blur-sm"
      >
        <summary
          class="cursor-pointer list-none text-center text-sm font-black uppercase tracking-[0.22em] text-slate-200"
        >
          Reference Grids
        </summary>

        <div class="mt-5 space-y-8">
          <section>
            <div class="mb-4 text-center">
              <h2
                class="mt-1 text-2xl font-black tracking-tight text-white sm:text-3xl inline-flex items-center flex-row gap-2"
              >
                All Nobles
                <div
                  id="noble-view-switcher"
                  class="hidden grid grid-cols-2 gap-2 rounded-lg bg-white/5 p-1"
                  hidden
                >
                  <button
                    class="rounded-md px-3 py-2.5 text-center text-xs font-black uppercase tracking-[0.18em] text-slate-300 transition hover:bg-white/8"
                    type="button"
                    value="picture"
                    data-noble-view
                    aria-pressed="true"
                  >
                    Picture Tiles
                  </button>
                  <button
                    class="rounded-md px-3 py-2.5 text-center text-xs font-black uppercase tracking-[0.18em] text-slate-300 transition hover:bg-white/8"
                    type="button"
                    value="labeled"
                    data-noble-view
                    aria-pressed="false"
                  >
                    Labeled Tiles
                  </button>
                </div>
              </h2>
            </div>
            <section
              id="noble-reference-grid"
              class="noble-board"
              aria-label="All noble tiles"
            ></section>
          </section>

          <section>
            <div class="mb-4 text-center">
              <h2 class="mt-1 text-2xl font-black tracking-tight text-white sm:text-3xl">
                All Cities
              </h2>
            </div>
            <section
              id="city-reference-grid"
              class="city-board"
              aria-label="All city tiles"
            ></section>
          </section>
        </div>
      </details>

      <footer class="mt-6 text-center text-sm text-slate-300">
        <a
          id="source-link"
          class="font-semibold text-amber-300 transition hover:text-amber-200"
          target="_blank"
          rel="noreferrer"
        >
          View source
        </a>
      </footer>
    </main>

    <main
      id="error-panel"
      class="mx-auto hidden min-h-dvh w-full max-w-3xl items-center justify-center px-4 py-8"
    >
      <section
        class="w-full rounded-[2rem] border border-white/12 bg-slate-950/60 p-8 text-center shadow-[0_18px_55px_rgba(0,0,0,0.3)] backdrop-blur-sm"
      >
        <p class="mb-2 text-[0.72rem] font-bold uppercase tracking-[0.32em] text-amber-300">
          <a class="transition hover:text-amber-200" href="./">Splendor Randomizer</a>
        </p>
        <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl">
          Could not load tiles
        </h1>
        <p id="error-message" class="mt-3 text-slate-300">Unknown error</p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
    <script type="module">
      import { DEV_MODE } from "./src/constants.data.js";

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          if (DEV_MODE) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if ("caches" in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map((key) => caches.delete(key)));
            }

            return;
          }

          const registration = await navigator.serviceWorker.register("./sw.js");
          void registration.update();
        });
      }
    </script>
  </body>
</html>
