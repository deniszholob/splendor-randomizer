<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Denis Zholob" />
    <meta
      name="keywords"
      content="Splendor, nobles, cities, randomizer, board game, shareable url, Denis Zholob"
    />
    <meta name="title" content="Splendor Randomizer" />
    <meta
      name="description"
      content="Generate random Splendor nobles or cities, then share the URL so everyone sees the same tiles."
    />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Splendor Randomizer" />
    <meta property="og:title" content="Splendor Randomizer" />
    <meta
      property="og:description"
      content="Generate random Splendor nobles or cities and share the same selection with a link."
    />
    <meta property="og:type" content="website" />

    <link
      rel="icon"
      type="image/webp"
      href="./assets/tokens/yellow.webp"
    />
    <link rel="apple-touch-icon" href="./assets/tokens/yellow.webp" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Splendor Randomizer</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-display: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      @layer base {
        html {
          @apply bg-slate-950;
        }

        body {
          @apply min-h-dvh bg-slate-950 font-[var(--font-display)] text-white antialiased;
          background-image:
            radial-gradient(circle at top, rgba(251, 191, 36, 0.18), transparent 28%),
            linear-gradient(180deg, #0f172a 0%, #111827 48%, #020617 100%);
        }
      }

      @layer components {
        .card-frame {
          @apply relative isolate overflow-hidden rounded-[1.2rem] border border-white/12 bg-slate-900/70 shadow-[0_14px_32px_rgba(0,0,0,0.28)];
          width: 100%;
          height: 100%;
        }

        .card-scrim {
          @apply pointer-events-none absolute inset-0 z-10;
          background:
            linear-gradient(180deg, rgba(2, 6, 23, 0.04) 0%, rgba(2, 6, 23, 0.14) 48%, rgba(2, 6, 23, 0.78) 100%);
        }

        .color-chip {
          @apply rounded-full border border-white/15 px-2 py-1 text-[0.62rem] font-extrabold uppercase tracking-[0.12em] text-white shadow-md sm:text-[0.68rem];
        }

        .color-chip-white {
          background: rgba(226, 232, 240, 0.28);
        }

        .color-chip-red {
          background: rgba(220, 38, 38, 0.35);
        }

        .color-chip-green {
          background: rgba(22, 163, 74, 0.35);
        }

        .color-chip-blue {
          background: rgba(37, 99, 235, 0.35);
        }

        .color-chip-black {
          background: rgba(15, 23, 42, 0.88);
        }

        .card-frame.is-missing .noble-fallback {
          @apply flex;
        }

        .mode-option {
          @apply block cursor-pointer rounded-2xl border border-white/12 bg-white/6 px-3 py-2.5 text-center text-xs font-black uppercase tracking-[0.18em] text-slate-300 transition hover:bg-white/10;
        }

        .mode-option:has(input:checked) {
          @apply border-amber-300 bg-amber-300 text-slate-950;
        }

        .noble-art-card .color-chip-stack {
          @apply hidden;
        }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
</html>
